<script type="text/babel">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accent": "#9D4EDD",
  "aura": "padrao",
  "heroLayout": "split",
  "density": "compacto"
}/*EDITMODE-END*/;

const AURA_MAP = { sutil: "rgba(123,47,190,0.32)", padrao: "rgba(123,47,190,0.55)", intensa: "rgba(123,47,190,0.8)" };
const PAD_MAP = { compacto: "84px", padrao: "112px", espacoso: "140px" };

function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);

  React.useEffect(() => {
    const r = document.documentElement;
    r.style.setProperty("--accent", t.accent);
    r.style.setProperty("--aura", AURA_MAP[t.aura] || AURA_MAP.padrao);
    r.style.setProperty("--section-pad", PAD_MAP[t.density] || PAD_MAP.padrao);
  }, [t.accent, t.aura, t.density]);

  React.useEffect(() => {
    const els = document.querySelectorAll(".reveal");
    if (!("IntersectionObserver" in window)) {
      els.forEach((el) => el.classList.add("in"));
      return;
    }
    const io = new IntersectionObserver((entries) => {
      entries.forEach((e) => {
        if (e.isIntersecting) { e.target.classList.add("in"); io.unobserve(e.target); }
      });
    }, { threshold: 0.12, rootMargin: "0px 0px -8% 0px" });
    els.forEach((el) => io.observe(el));
    const fallback = setTimeout(() => els.forEach((el) => el.classList.add("in")), 1600);
    return () => { io.disconnect(); clearTimeout(fallback); };
  }, []);

  return (
    <React.Fragment>
      <Nav />
      <main>
        <HeroPreview />
        <Metrics />
        <Showcase />
        <Ecossistema />
        <Platform />
        <Subscription />
        <Checkout />
        <DadosDashboard />
        <Recursos />
        <Problema />
        <ProvaSocial />
        <Projeto10x />
        <Migracao />
        <FAQ />
        <FinalCTA />
      </main>
      <Footer />
      <WhatsAppFloater />
      <DemoModal />

      <TweaksPanel>
        <TweakSection label="Paleta" />
        <TweakColor label="Roxo" value={t.accent}
          options={["#7B2FBE", "#9D4EDD", "#6921A8", "#C99BFF"]}
          onChange={(v) => setTweak("accent", v)} />
        <TweakRadio label="Brilho" value={t.aura}
          options={["sutil", "padrao", "intensa"]}
          onChange={(v) => setTweak("aura", v)} />
        <TweakSection label="Densidade" />
        <TweakRadio label="Espaçamento" value={t.density}
          options={["compacto", "padrao", "espacoso"]}
          onChange={(v) => setTweak("density", v)} />
      </TweaksPanel>
    </React.Fragment>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
